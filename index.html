<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奈落の討伐カウンター - Kount</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0c;
            color: #f0ead6;
            font-family: 'Cinzel', 'Noto Serif JP', serif;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.2;
            background-image: radial-gradient(#4a463d 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: -1;
        }

        /* 背景画像コンテナのスタイリング */
        .dungeon-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;  /* 0以上に設定（背景色の前に出す） */
            object-fit: cover;
            filter: brightness(0.65) contrast(1.1); /* 輝度を下げ、コントラストを少し上げる */
            opacity: 0.8;
        }

        /* キャンバスを少し透過させて画像を見せる */
        #dungeon-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            mix-blend-mode: screen; /* ワイヤーフレームを光らせて合成 */
        }


        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0a0c;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #8a7a5e;
            border-radius: 4px;
            border: 2px solid #0a0a0c;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #f1c40f;
        }

        /* レトロフォント設定 */
        .font-retro {
            font-family: 'DotGothic16', sans-serif;
            letter-spacing: 0.1em;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; text-shadow: 0 0 20px #ff5555; transform: scale(1.05); }
        }
        
        .animate-pulse-abyss {
            animation: pulse-red 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes slide-in-right {
            0% { transform: translateX(100%); opacity: 0; }
            10% { transform: translateX(0); opacity: 1; }
            90% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        .guild-notice {
            animation: slide-in-right 4s ease-in-out forwards;
        }

        .count-display {
            font-family: 'Cinzel', serif;
            text-shadow: 6px 6px 0px #000;
        }

        .btn-active:active {
            transform: translateY(4px);
        }

        .hidden-element {
            display: none !important;
        }

        .fade-in-text {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel {
            background-color: rgba(10, 10, 12, 0.6); /* 少し透明度を上げる */
            /* backdrop-filter: blur(1px);  ぼかしを強めて文字を浮き立たせる */
        }

    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">
    <div class="bg-pattern"></div>

    <div id="guild-board" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-4 gap-6 relative z-10">
        
        <!-- 左サイド：ステータスパネル -->
        <div class="lg:col-span-1 flex flex-col gap-6">
            <div class="bg-[#1a1a1f] border-2 border-[#8a7a5e] p-5 shadow-xl">
                <h3 class="text-[#d4af37] text-lg md:text-xl font-black tracking-[0.4em] uppercase mb-6 border-b-2 border-[#8a7a5e] pb-2 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
                    征伐の軌跡
                </h3>
                
                <div class="space-y-5">
                    <div>
                        <p class="text-sm font-black uppercase tracking-[0.3em] mb-3 text-[#f1c40f] drop-shadow-[0_0_5px_rgba(241,196,15,0.3)]">現在の記録</p>
                        <div class="flex justify-between items-end mb-1">
                            <span class="text-xs text-[#f0ead6] opacity-90">最短討伐:</span>                            
                            <span id="session-fastest" class="text-base font-mono font-black text-[#55efc4] leading-none">--:--:--</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-xs text-[#f0ead6] opacity-90">最長討伐:</span>
                            <span id="session-slowest" class="text-base font-mono font-black text-[#ff7675] leading-none">00:00:00</span>
                        </div>
                    </div>

                    <div class="pt-6 border-t-2 border-[#5c5443]">
                        <p class="text-sm font-black uppercase tracking-[0.3em] mb-3 text-[#f1c40f] drop-shadow-[0_0_5px_rgba(241,196,15,0.3)]">
                            歴戦の断章
                        </p>
                        <div class="flex justify-between items-end mb-1">
                            <span class="text-xs text-[#f0ead6] opacity-90">歴代最高速:</span>
                            <span id="global-fastest" class="text-base font-mono font-black text-[#f1c40f] leading-none">00:00:00</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-xs text-[#f0ead6] opacity-90">歴代最長戦:</span>
                            <span id="global-slowest" class="text-base font-mono font-black text-[#d4af37] leading-none">00:00:00</span>
                        </div>
                    </div>

                    <button onclick="resetGlobalRecords()" 
                        class="w-full mt-4 py-3 bg-[#2a1a1a] border-2 border-[#a01a1a] text-xs md:text-sm text-[#ffaaaa] hover:bg-[#631919] hover:text-white hover:border-[#ff4d4d] transition-all uppercase tracking-[0.3em] font-black shadow-[0_0_15px_rgba(160,26,26,0.3)] group">
                        <span class="group-hover:scale-110 transition-transform inline-block">
                            全記録を灰燼に帰す
                        </span>
                    </button>
                </div>
            </div>


            <!-- Slayer's Creed (Font Size Increased) -->
            <div class="bg-[#25252b] border-2 border-[#5c5443] p-6 flex flex-col gap-4 text-[#f0ead6] shadow-xl">
                <!-- タイトル部分を強調 -->
                <div class="flex items-center gap-3 text-[#d4af37] border-b border-[#5c5443] pb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span class="text-lg md:text-xl font-black uppercase tracking-[0.3em] drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
                        冒険者の遺訓
                    </span>
                </div>
                
                <!-- 格言テキスト -->
                <div id="slayers-creed-text" class="fade-in-text min-h-[4em] text-base md:text-lg font-bold italic tracking-wider leading-relaxed text-[#f0ead6] pt-2">
                    「記録が消えても、磨かれた刃の鋭さは魂に刻まれている。」
                </div>
            </div>

        </div>




        <!-- 中央：メインインターフェース -->
        <div class="lg:col-span-2 flex flex-col gap-6">
            <div class="border-2 border-[#8a7a5e] rounded-sm p-8 shadow-[0_0_50px_rgba(0,0,0,1)] relative overflow-hidden group bg-[#000]">
                <img src="image_kunoichi.png" alt="Kunoichi Background" class="dungeon-bg-image">
            
            
                <!-- Dungeon Wireframe Background -->
                <canvas id="dungeon-canvas"></canvas>

                <!-- UI Overlay Panel -->
                <div class="glass-panel relative z-10 p-6 border border-[#ffffff11] rounded-sm">
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-[#d4af37] pointer-events-none opacity-50"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-[#d4af37] pointer-events-none opacity-50"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-[#d4af37] pointer-events-none opacity-50"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-[#d4af37] pointer-events-none opacity-50"></div>

                    <div class="mb-10 flex flex-col items-center relative">
                        <div id="title-container" class="flex items-center gap-4">
                            <div class="h-[2px] w-8 bg-[#d4af37] opacity-60"></div>
                            <h1 id="app-title" class="text-2xl md:text-3xl tracking-[0.2em] font-black uppercase text-[#f1c40f] flex items-center gap-4 drop-shadow-[0_2px_8px_rgba(0,0,0,1)] text-center">
                                魔物の群れ
                            </h1>
                            <div class="h-[2px] w-8 bg-[#d4af37] opacity-60"></div>
                            <button onclick="toggleEditTitle()" class="text-[#d4af37] hover:text-white ml-2 transition-colors opacity-50 hover:opacity-100">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                            </button>
                        </div>
                        <div id="title-edit-container" class="hidden-element flex items-center border-b-2 border-[#d4af37] py-1 bg-[#25252b] px-6 rounded-t-sm">
                            <input id="title-input" type="text" class="text-xl font-bold bg-transparent outline-none text-center text-[#ffffff]" onkeydown="if(event.key==='Enter') saveTitle()">
                            <button onclick="saveTitle()" class="text-[#d4af37] hover:text-white ml-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="relative mb-12 flex flex-col items-center">
                        <div class="absolute -top-8 text-xs tracking-[0.4em] text-[#d4af37] uppercase font-black drop-shadow-md">Kill Count</div>
                        <div id="main-count" class="text-[120px] md:text-[160px] font-black tabular-nums select-none leading-none transition-all duration-700 text-[#1a1a1f] count-display">
                            　
                        </div>

                        <!-- 画面中央のタイマーカウント表示 -->
                        <div id="status-indicator" class="hidden-element mt-8 flex items-center justify-center gap-6 text-[#ff5555] font-black text-2xl md:text-3xl tracking-[0.5em] uppercase animate-pulse-abyss drop-shadow-[0_0_15px_rgba(255,85,85,0.8)] font-retro">
                            <div class="w-4 h-4 bg-[#ff5555] rounded-full shadow-[0_0_20px_#ff5555]"></div>
                            <span id="live-timer">00:00:00</span>
                            <div class="w-4 h-4 bg-[#ff5555] rounded-full shadow-[0_0_20px_#ff5555]"></div>
                        </div>

                    </div>

                    <div class="grid grid-cols-4 gap-4 w-full max-w-md mx-auto relative">
                        <button id="action-btn" onclick="handleAction()" class="col-span-3 relative group btn-active transition-all py-8 rounded-sm overflow-hidden border-2 shadow-[0_10px_30px_rgba(0,0,0,0.8)] border-[#55efc4] bg-[#1a4a3a]">
                            <div class="absolute inset-0 opacity-20 group-hover:opacity-30 transition-opacity bg-[#55efc4]" id="btn-overlay"></div>
                            <div class="flex flex-col items-center relative z-10" id="btn-content">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[#55efc4]"><path d="M14.5 17.5 3 6V3h3l11.5 11.5"/><path d="m13 19 6-6"/><path d="m16 22 5-5"/><circle cx="6" cy="18" r="3"/></svg>
                                <span class="font-black mt-2 text-lg tracking-[0.5em] text-[#55efc4] drop-shadow-[0_2px_8px_rgba(0,0,0,1)]">討伐開始</span>
                            </div>
                        </button>
                        
                        <button id="secondary-btn" onclick="resetAndSave()" class="col-span-1 bg-[#221111] hover:bg-[#441111] btn-active text-[#ff5555] rounded-sm border-2 border-[#a01a1a] flex flex-col items-center justify-center transition-all shadow-xl">
                            <div id="secondary-btn-content" class="flex flex-col items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-[0_0_10px_rgba(255,85,85,0.6)]"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a4 4 0 1 1 0 8h-1"/></svg>
                                <span class="text-lg font-black mt-2 tracking-[0.3em] text-[#ffaaaa]">帰還</span>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右サイド：ログ -->
        <div class="lg:col-span-1 bg-[#1e1e24] border-2 border-[#8a7a5e] rounded-sm p-6 flex flex-col h-[600px] lg:h-[calc(100vh-100px)] shadow-2xl relative overflow-hidden">
            <div class="flex flex-col mb-4 border-b-4 border-[#3d382e] pb-4">
                <div class="flex items-center justify-between mb-2">
                
                    <h2 class="text-xl font-black flex items-center gap-3 text-[#f1c40f] tracking-[0.3em] uppercase drop-shadow-sm w-full">
                        <span class="flex items-center gap-3 flex-shrink-0 whitespace-nowrap">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        討伐記録
                        <span id="total-slain-count" class="ml-auto text-sm font-black bg-[#3a352a] border-2 border-[#f1c40f] px-4 py-1 text-[#ffffff] shadow-md min-w-[3rem] text-center" title="累計討伐数">
                            0
                        </span>
                    </h2>
                </div>
                <!-- 全体統計表示エリア -->

                <div class="flex justify-between items-end tracking-widest font-black uppercase">
                    <span class="text-xs text-[#9ca3af]">総討伐時間</span> 
                    <span id="session-total-time" class="text-sm font-mono font-black text-[#f0ead6]">00:00:00</span>
                </div>

                <div class="flex justify-between items-end tracking-widest font-black uppercase">
                    <span class="text-xs text-[#9ca3af]">平均討伐時間</span>
                    <span id="session-avg-time" class="text-sm font-mono font-black text-[#f1c40f]">00:00:00</span>
                </div>



                
            </div>

            <div id="history-list" class="flex-1 overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                <div id="empty-history" class="h-full flex flex-col items-center justify-center text-[#d4af37] text-sm tracking-[0.4em] text-center uppercase leading-loose font-bold">
                    <div class="w-24 h-[3px] bg-gradient-to-r from-transparent via-[#d4af37] to-transparent mb-8"></div>
                    <p>No victims<br/>recorded yet...</p>
                    <div class="w-24 h-[3px] bg-gradient-to-r from-transparent via-[#d4af37] to-transparent mt-8"></div>
                </div>
            </div>
            
            <div class="mt-8 pt-6 border-t-4 border-[#3d382e] text-xs text-[#d4af37] text-center tracking-[0.4em] uppercase font-black bg-gradient-to-b from-transparent to-[#00000044] pb-2">
                <div>”リスク”を味わい尽くせ</div>
            </div>
        </div>

    </div>

    <script>
        const STORAGE_KEY = 'abyss_slayer_records_v4';

        const creeds = [
            // --- オリジナルメッセージ ---      
            "記録が消えても、磨かれた刃の鋭さは魂に刻まれている。",
            "立ち止まるな。奈落は止まった者から飲み込んでいく。",
            "恐怖を抱け。それが生き残るための唯一の防具となる。",
            "一太刀ごとに己の業を斬り捨てよ。",
            "勝利とは、倒した数ではなく、次に踏み出す一歩のことだ。",
            "死線の上でこそ、剣士の真価は輝きを増す。",
            "血の匂いは、生存を証明する唯一の香りだ。",
            "武器が折れれば拳で、拳が砕ければ牙で. それが狩人の誇りだ。",
            "獲物の悲鳴を子守唄に、安らかな眠りなど忘れるがいい。",
            "深淵を覗くとき、深淵もまたお前を獲物として見ている。",
            "強さとは力ではない。何度膝をついても立ち上がる意志のことだ。",
            "名誉は墓標に刻め。今はただ、次の首を狩ることだけを考えろ。",
            "ダンジョンに憐れみはない。あるのは結果と、沈黙だけだ。",
            "刃を研ぐ音は、死神へ送る招待状である。",
            "影の中で生きる者が、光を最も鋭く捉えることができる。",
            "逃げることは恥ではない。だが、逃げたまま終わることは罪だ。",
            "限界を超えた先に、真の境地が待っている。",
            "敵の骸（むくろ）を積み上げ、天に届く階段を築け。",
            "静寂は最悪の予兆。嵐が来る前に、その心拍を鎮めよ。",
            "剣は語らず、ただ真実のみを刻む。",

            // --- 追加メッセージ ---      
            // --- 闘争と本能 ---
            "肉を切らせて、魂を断て。",
            "生存とは、他者の命を奪うことの言い換えに過ぎない。",
            "理性を捨てろ。ダンジョンでは獣の直感こそが正解を導く。",
            "飢えを忘れるな。満たされた狩人は真っ先に死ぬ。",
            "痛みは生きている証、痺れは死への誘い。",
            "咆哮はいらぬ。ただ一撃で沈めれば事足りる。",
            "返り血は、戦士が纏うべき唯一の礼装だ。",
            "死を恐れるな。死に損なうことを恐れよ。",
            "狩るか狩られるか。この世にはその二種類しか存在しない。",
            "獲物が大きいほど、崩れ落ちる時の音は心地よい。",

            // --- 武器と鍛錬 ---
            "剣は身体の延長ではない。魂の具現である。",
            "研ぎ澄まされた刃は、迷いさえも切り裂く。",
            "一振りに万感の想いを込めよ。さもなくば鉄の棒に過ぎぬ。",
            "守るための盾は捨てろ。攻めるための盾を持て。",
            "鋼は嘘をつかない。裏切るのはいつも人間の心だ。",
            "振るわれぬ剣は、錆びた釘と同じだ。",
            "刃の欠けは、戦士の記憶そのものである。",
            "最良の武器は、絶望の淵で見出した執念だ。",
            "一撃で殺せぬのなら、千回振るえばいい。",

            // --- 深淵と闇 ---
            "暗闇を愛せ。光は敵に位置を教えるだけだ。",
            "影は裏切らない。常に汝の足元に寄り添っている。",
            "深淵の底には、神も仏もいやしない。あるのは己だけだ。",
            "夜が深いのではない。お前の目が光を拒んでいるのだ。",
            "絶望を食らい、希望を毒として吐き出せ。",
            "地獄が満員なら、ここに新たな地獄を作ればいい。",
            "呪いさえも力に変えろ。聖者の祈りより役に立つ。",
            "闇を知らぬ者に、真の光は斬れない。",
            "冥府への道連れは多いほうが賑やかで良い。",
            "己の中の怪物を飼い慣らせ。喰われる前に。",

            // --- 意志と誇り ---
            "跪いて生きるより、立ち上がって死ぬことを選べ。",
            "伝説とは、生き残った臆病者が語る物語に過ぎない。",
            "過去を振り返るな。首を落とした敵が笑っているぞ。",
            "信念なき力は暴虐、力なき信念は無能だ。",
            "道がないなら、死体の山で道を作れ。",
            "誇りだけで腹は膨らまないが、心は枯れない。",
            "運命を呪う暇があるなら、運命の喉元を掻き切れ。",
            "他人の物差しで死ぬな。自分の意志で地獄へ行け。",
            "英雄とは、最も長く絶望に耐えた者の別名だ。",
            "名もなき戦士として死ね。名は風が運んでいく。",

            // --- 非情な現実 ---
            "奇跡を待つな。それは死体の山の上にしか現れない。",
            "慈悲は強者の特権。弱者の慈悲は自殺行為だ。",
            "神に祈るな。神が助けてくれるなら、お前はここにいない。",
            "裏切りは期待の裏返し。最初から何も信じるな。",
            "涙で血は洗えない。洗えるのは新たな血だけだ。",
            "約束は墓場まで持っていけ。生きてる間は重荷になる。",
            "善悪に意味はない。ただ、剣の長さが届くかどうかが問題だ。",

        // Wireframe Rendering Engine
        const canvas = document.getElementById('dungeon-canvas');

        let frame = 0;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        function drawWireframe() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const w = canvas.width;
            const h = canvas.height;
            const centerX = w / 2;
            const centerY = h / 2;
            
            let opacity = 0.4 + Math.sin(frame * 0.05) * 0.1;
            let shakeX = 0;
            let shakeY = 0;
            
            if (count !== null) {
                ctx.strokeStyle = `rgba(255, 80, 80, ${opacity})`;
                ctx.lineWidth = 1.5;
                shakeX = (Math.random() - 0.5) * 2;
                shakeY = (Math.random() - 0.5) * 2;
            } else {
                ctx.strokeStyle = `rgba(138, 122, 94, 0.25)`;
                ctx.lineWidth = 1;
            }

            const depths = [1, 0.6, 0.36, 0.216, 0.13]; 
            
            ctx.save();
            ctx.translate(shakeX, shakeY);
            ctx.beginPath();
            
            ctx.moveTo(0, 0); ctx.lineTo(centerX, centerY);
            ctx.moveTo(w, 0); ctx.lineTo(centerX, centerY);
            ctx.moveTo(0, h); ctx.lineTo(centerX, centerY);
            ctx.moveTo(w, h); ctx.lineTo(centerX, centerY);

            depths.forEach((d) => {
                const dw = w * d;
                const dh = h * d;
                const left = centerX - dw / 2;
                const right = centerX + dw / 2;
                const top = centerY - dh / 2;
                const bottom = centerY + dh / 2;
                
                ctx.moveTo(left, top);
                ctx.lineTo(right, top);
                ctx.lineTo(right, bottom);
                ctx.lineTo(left, bottom);
                ctx.lineTo(left, top);
                
                if (d === 1) {
                    for (let i = 1; i < 5; i++) {
                        const step = w * 0.1 * i;
                        ctx.moveTo(centerX - step, h); ctx.lineTo(centerX, centerY);
                        ctx.moveTo(centerX + step, h); ctx.lineTo(centerX, centerY);
                        ctx.moveTo(centerX - step, 0); ctx.lineTo(centerX, centerY);
                        ctx.moveTo(centerX + step, 0); ctx.lineTo(centerX, centerY);
                    }
                }
            });

            ctx.stroke();
            ctx.restore();

            frame++;
            requestAnimationFrame(drawWireframe);
        }

        function formatDuration(ms) {
            // Infinity（初期値）の場合は「--:--:--」を表示して区別する
            if (ms === Infinity || ms === -Infinity || ms === null || isNaN(ms)) return "--:--:--";
            
            const totalSeconds = Math.floor(ms / 1000);
            // もし1秒未満でも記録として残したい場合は、最低1秒とみなすか、
            // 内部ロジックで「0秒（連打）」を弾くようにします。
            
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function handleAction() {
            const now = new Date();
            const diff = now - lastCountTime;
            const timestamp = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            // 500ms(0.5秒)未満の記録は、最速記録として更新しない（連打対策）
            // あるいは diff > 0 の条件を厳格にする
            if (diff > 500 && diff < records.global.fastest) {
                records.global.fastest = diff;
                showGuildNotice('fast', diff); 
            }
            
            updateCreed(); 

            if (count === null) {
                records.session = { fastest: Infinity, slowest: -Infinity };
                count = 0; 
                lastCountTime = now; 
                totalSlayingTime = 0;
                history.unshift({ id: Date.now(), type: 'start', value: '---', elapsed: "出発", timestamp });
                
                // タイマー開始
                liveTimerEl.innerText = "00:00:00";
                liveTimerInterval = setInterval(updateLiveTimer, 1000);
            } else {
                const diff = now - lastCountTime;
                count++; 
                totalSlain++; 
                lastCountTime = now;
                totalSlayingTime += diff;

                if (diff < records.session.fastest) records.session.fastest = diff;
                if (diff > records.session.slowest) records.session.slowest = diff;

                if (diff < records.global.fastest) {
                    records.global.fastest = diff;
                    showGuildNotice('fast', diff); 
                }
                if (diff > records.global.slowest) records.global.slowest = diff;
                history.unshift({ id: Date.now(), type: 'count', value: count, elapsed: `${formatDuration(diff)}`, timestamp });
                
                // 次のカウントに向けて表示をリセット（即座に反応した感を出すため）
                liveTimerEl.innerText = "00:00:00";
            }
            saveData();
            updateRecordUI();
            updateUI();
        }

        function resetAndSave() {
            updateCreed(); 

            if (count !== null) {
                const now = new Date();
                const timestamp = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                // バトルの最終ラグを加算
                const finalDiff = now - lastCountTime;
                totalSlayingTime += finalDiff;
                
                // セッション累計時間に加算
                sessionTotalTime += totalSlayingTime;

                history.unshift({ 
                    id: Date.now(), 
                    type: 'reset', 
                    value: count, 
                    elapsed: `討伐合計時間: ${formatDuration(totalSlayingTime)}`, 
                    timestamp, 
                    isSummary: true 
                });
                
                count = null; 
                lastCountTime = null; 
                totalSlayingTime = 0;
                
                // タイマー停止
                clearInterval(liveTimerInterval);
                liveTimerInterval = null;
            } 
            else {
                if (history.length > 0 || totalSlain > 0) {
                    if (confirm("討伐記録 および 累計討伐数、セッション統計をすべて消去しますか？")) {
                        history = [];
                        totalSlain = 0;
                        sessionTotalTime = 0;
                    } else {
                        return;
                    }
                }
            }
            
            saveData();
            updateRecordUI();
            updateUI();
        }

        function resetGlobalRecords() {
            if (confirm("「征伐の軌跡」をリセットしますか？")) {
                records.global = { fastest: Infinity, slowest: -Infinity };
                records.session = { fastest: Infinity, slowest: -Infinity };

            titleContainer.classList.add('hidden-element');
            titleEditContainer.classList.remove('hidden-element');
            titleInput.value = title;

        function saveTitle() {
            const newTitle = titleInput.value.trim();
            if (newTitle) { title = newTitle; appTitleEl.innerText = title; saveData(); }
            titleContainer.classList.remove('hidden-element');
            titleEditContainer.classList.add('hidden-element');
        }


        // 全てのボタンに対して、クリック後にフォーカスを外す処理を追加
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                btn.blur();
            });
        });

        window.addEventListener('keydown', function(e) {
            // 押されたのがスペースキーで、かつ入力フォーム(input)を操作していない場合
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault(); // ボタン押下などのデフォルト動作を阻止
            }
        });


        loadData();
    </script>
</body>
</html>
